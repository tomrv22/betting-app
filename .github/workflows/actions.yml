name: Telegram Trigger Bot

on:
  schedule:
    - cron: "*/2 * * * *"
  workflow_dispatch:

jobs:
  check-telegram:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Telegram check + trigger script
        env:
          API_TOKEN: ${{ secrets.SOCCERDATA_API }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python telegram_check.py

      - name: Commit file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add latest-pre-match.txt
          git commit -m "update file" || echo "no changes"
          git push